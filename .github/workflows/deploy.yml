name: Build and Release Executable

on:
  release:
    types: [published] # De Action start zodra je een Release publiceert

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Cruciaal: hiermee mag de Action bestanden toevoegen aan de release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Build Executable with PyInstaller
        run: pyinstaller --noconsole --onefile --add-data "frontend/dist;frontend/dist" main.py

      - name: Create Zip Archive
        shell: pwsh
        run: |
          # We maken een zip van de exe in de dist map
          Compress-Archive -Path dist/main.exe -DestinationPath dist/ImageExtractor-Windows.zip

      - name: Upload Zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ImageExtractor-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Backup in Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: ImageExtractor-Windows-Zip
          path: dist/ImageExtractor-Windows.zip
