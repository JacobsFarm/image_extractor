name: Build and Release Executable

on:
  release:
    types: [published] # De Action start zodra je een Release publiceert

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Cruciaal: hiermee mag de Action bestanden toevoegen aan de release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Build Executable
        run: pyinstaller --noconsole --onefile --add-data "frontend/dist;frontend/dist" main.py

      # Deze stap uploadt de .exe direct naar de release die je net hebt aangemaakt
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/main.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optioneel: Je kunt de artifact ook nog steeds bewaren in het Actions tabblad
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageExtractor
          path: dist/main.exe
